server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hirexhireRecommendation
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Recommendation settings
recommendation:
  cache-ttl: 3600  # Cache recommendations for 1 hour
  min-score-threshold: 0.3  # Only recommend if score > 30%
  max-results: 50